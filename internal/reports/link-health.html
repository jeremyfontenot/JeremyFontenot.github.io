<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Link Health Report</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #07111f;
      --panel: #0e1b2d;
      --panel-2: #12253d;
      --text: #e7eefc;
      --muted: #98a8c6;
      --accent: #5de4c7;
      --warn: #ff8f70;
      --bad: #ff5c7a;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(93, 228, 199, 0.14), transparent 30%),
        radial-gradient(circle at top right, rgba(255, 92, 122, 0.12), transparent 24%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
    }

    header, section, .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    header {
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 20px;
    }

    h1, h2, h3, p { margin-top: 0; }
    h1 { margin-bottom: 8px; font-size: clamp(1.8rem, 4vw, 3rem); }
    .subtle { color: var(--muted); line-height: 1.5; }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-top: 18px;
    }

    .metric {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
    }

    .metric .label { display: block; color: var(--muted); font-size: 0.8rem; margin-bottom: 6px; }
    .metric .value { font-size: 1.4rem; font-weight: 700; }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin: 20px 0;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
    }

    button.active {
      background: var(--accent);
      color: #031317;
      border-color: transparent;
    }

    .layout {
      display: grid;
      gap: 18px;
    }

    .card {
      border-radius: 22px;
      padding: 20px;
    }

    .file-block + .file-block { margin-top: 16px; }
    .file-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .file-title small { color: var(--muted); font-weight: 500; }

    .entry {
      border-top: 1px solid var(--border);
      padding-top: 12px;
      margin-top: 12px;
    }

    .entry:first-of-type { border-top: 0; padding-top: 0; margin-top: 0; }
    .entry .url { font-weight: 600; word-break: break-word; }
    .entry .meta { color: var(--muted); margin-top: 4px; font-size: 0.94rem; }
    .pill {
      display: inline-block;
      margin-left: 8px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      vertical-align: middle;
    }
    .external_public { background: rgba(93, 228, 199, 0.14); color: var(--accent); }
    .internal_document { background: rgba(120, 160, 255, 0.14); color: #9fc0ff; }
    .restricted_access { background: rgba(255, 143, 112, 0.14); color: #ffbcaa; }
    .deferred { background: rgba(255, 255, 255, 0.12); color: #d5def2; }
    .legacy_export { background: rgba(168, 140, 255, 0.14); color: #d4c6ff; }
    .invalid_malformed { background: rgba(255, 92, 122, 0.18); color: #ff9cb0; }
    .broken { border-left: 4px solid var(--bad); padding-left: 12px; }
    .valid { border-left: 4px solid var(--accent); padding-left: 12px; }
    .empty { color: var(--muted); padding: 20px 0; }

    .loading { padding: 24px; color: var(--muted); }

    @media (max-width: 720px) {
      .wrap { padding: 14px; }
      header, .card { border-radius: 18px; }
      .toolbar { align-items: stretch; }
      .filters { width: 100%; }
      button { flex: 1 1 auto; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Link Health Report</h1>
      <p class="subtle">Static viewer for <code>link-scan-report.json</code>. Grouped by source file, filterable by classification, and designed for quick inspection of broken external links.</p>
      <div id="summary" class="summary-grid"></div>
    </header>

    <div class="toolbar">
      <div class="filters" id="filters"></div>
      <div class="subtle" id="status">Loading report...</div>
    </div>

    <main id="content" class="layout"></main>
  </div>

  <script>
    const reportUrl = '../link-scan-report.json';
    const categories = ['all', 'external_public', 'internal_document', 'restricted_access', 'deferred', 'legacy_export', 'invalid_malformed', 'ignored_metadata'];
    let report = [];
    let activeFilter = 'all';

    const summaryEl = document.getElementById('summary');
    const filtersEl = document.getElementById('filters');
    const contentEl = document.getElementById('content');
    const statusEl = document.getElementById('status');

    function titleCase(value) {
      return value.replace(/_/g, ' ').replace(/\b\w/g, (char) => char.toUpperCase());
    }

    function summarize(items) {
      return {
        total: items.length,
        external_public: items.filter((item) => item.type === 'external_public').length,
        internal_document: items.filter((item) => item.type === 'internal_document').length,
        restricted_access: items.filter((item) => item.type === 'restricted_access').length,
        deferred: items.filter((item) => item.type === 'deferred').length,
        legacy_export: items.filter((item) => item.type === 'legacy_export').length,
        invalid_malformed: items.filter((item) => item.type === 'invalid_malformed').length,
        ignored_metadata: items.filter((item) => item.type === 'ignored_metadata').length,
        broken_external: items.filter((item) => item.type === 'external_public' && (item.status === 'broken' || item.status === 'error' || (Number(item.httpStatus) >= 400 && Number(item.httpStatus) < 600))).length
      };
    }

    function renderSummary(items) {
      const summary = summarize(items);
      const metrics = [
        ['Total', summary.total],
        ['External', summary.external_public],
        ['Broken', summary.broken_external],
        ['Internal', summary.internal_document],
        ['Restricted', summary.restricted_access],
        ['Deferred', summary.deferred],
        ['Legacy', summary.legacy_export]
      ];

      summaryEl.innerHTML = metrics.map(([label, value]) => `
        <div class="metric"><span class="label">${label}</span><span class="value">${value}</span></div>
      `).join('');
    }

    function renderFilters() {
      filtersEl.innerHTML = categories.map((type) => `
        <button type="button" class="${type === activeFilter ? 'active' : ''}" data-type="${type}">${type === 'all' ? 'All' : titleCase(type)}</button>
      `).join('');

      filtersEl.querySelectorAll('button').forEach((button) => {
        button.addEventListener('click', () => {
          activeFilter = button.dataset.type;
          renderFilters();
          renderContent();
        });
      });
    }

    function renderContent() {
      const items = activeFilter === 'all' ? report : report.filter((item) => item.type === activeFilter);
      const grouped = items.reduce((map, item) => {
        const key = item.sourceFile || 'unknown';
        if (!map.has(key)) map.set(key, []);
        map.get(key).push(item);
        return map;
      }, new Map());

      if (!items.length) {
        contentEl.innerHTML = '<div class="card empty">No entries match the selected filter.</div>';
        statusEl.textContent = 'No rows to display.';
        return;
      }

      const fragments = [];
      grouped.forEach((entries, file) => {
        fragments.push(`
          <section class="card file-block">
            <div class="file-title">
              <span>${file.split(/[\\/]/).pop()}</span>
              <small>${entries.length} item${entries.length === 1 ? '' : 's'}</small>
            </div>
            ${entries.map(renderEntry).join('')}
          </section>
        `);
      });

      contentEl.innerHTML = fragments.join('');
      statusEl.textContent = `${items.length} item${items.length === 1 ? '' : 's'} shown.`;
    }

    function renderEntry(item) {
      const isBroken = item.type === 'external_public' && (item.status === 'broken' || item.status === 'error' || (Number(item.httpStatus) >= 400 && Number(item.httpStatus) < 600));
      const stateClass = isBroken ? 'broken' : 'valid';
      const httpStatus = item.httpStatus === null || item.httpStatus === undefined || item.httpStatus === '' ? 'n/a' : item.httpStatus;
      const source = item.sourceFile ? item.sourceFile.split(/[\\/]/).pop() : 'unknown';
      return `
        <article class="entry ${stateClass}">
          <div class="url">${escapeHtml(item.url || '(empty)')} <span class="pill ${item.type}">${titleCase(item.type)}</span></div>
          <div class="meta">Status: ${escapeHtml(String(item.status || 'unknown'))} · HTTP: ${escapeHtml(String(httpStatus))} · Source: ${escapeHtml(source)}</div>
        </article>
      `;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    async function init() {
      try {
        const response = await fetch(reportUrl, { cache: 'no-store' });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        report = Array.isArray(data) ? data : [];
        renderSummary(report);
        renderFilters();
        renderContent();
        statusEl.textContent = `Loaded ${report.length} report entries.`;
      } catch (error) {
        summaryEl.innerHTML = '';
        filtersEl.innerHTML = '';
        contentEl.innerHTML = '<div class="card empty">Unable to load <code>link-scan-report.json</code>. Run the scanner locally or publish the JSON artifact alongside this page.</div>';
        statusEl.textContent = `Load failed: ${error.message}`;
      }
    }

    init();
  </script>
</body>
</html>
