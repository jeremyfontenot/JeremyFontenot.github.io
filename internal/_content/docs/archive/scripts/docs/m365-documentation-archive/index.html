<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M365 Documentation Archive</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: #f8fafc;
            color: #0f172a;
        }

        .wrap {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.25rem 3rem;
        }

        .panel {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }

        h1 {
            margin-top: 0;
            font-size: 1.9rem;
        }

        ul {
            margin: 0;
            padding-left: 1.1rem;
            line-height: 1.8;
        }

        a {
            color: #0369a1;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="panel">
            <h1>M365 Documentation Archive</h1>
            <p>This archive preserves your Microsoft 365 lab documentation pages as local HTML and ASPX exports.</p>
        </div>

        <div class="panel">
            <h2>Supporting Files</h2>
            <ul>
                <li><a href="./Lab-Portfolio.pdf">Lab Portfolio (PDF)</a></li>
                <li><a href="./manifest.json">manifest.json</a></li>
                <li><a href="./aspx/index.html">ASPX export folder</a></li>
                <li><a href="./html/index.html">HTML export folder</a></li>
            </ul>
        </div>
    </div>
</body>
</html>
