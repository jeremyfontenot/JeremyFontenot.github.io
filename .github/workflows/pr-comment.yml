name: PR: Manifest Integrity Summary

on:
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Validation mode (lenient|normal|strict|release). Only used for manual runs.'
        required: false
        default: 'normal'

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-manifest-summary:
    name: Run manifest integrity and comment on PR
    runs-on: ubuntu-latest
    env:
      MODE: ${{ github.event_name == 'pull_request' && 'normal' || github.ref == 'refs/heads/main' && 'strict' || startsWith(github.ref, 'refs/tags/') && 'release' || startsWith(github.ref, 'refs/heads/develop') && 'lenient' || startsWith(github.ref, 'refs/heads/feature/') && 'lenient' || startsWith(github.ref, 'refs/heads/hotfix/') && 'normal' || github.event.inputs.mode || 'normal' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Regenerate manifest
        run: |
          python tools/generate_manifest.py

      - name: Run manifest integrity analyzer
        id: run-check
        run: |
          python tools/validate_manifest_integrity.py --mode="${MODE}" || true
        continue-on-error: true

      - name: Post summary comment to PR (with gating)
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = 'artifacts/manifest-integrity';
            const marker = '<!-- manifest-integrity-report -->';
            function read(name){ try { return fs.readFileSync(`${path}/${name}`, 'utf8').trim(); } catch(e) { return null } }
            let summaryStr = read('summary.json');
            let summary = summaryStr ? JSON.parse(summaryStr) : {};
            const missing = read('missing_manifest_targets.txt');
            const orphaned = read('orphaned_docs.txt');
            const dupPaths = read('duplicate_paths.txt');
            const dupTitles = read('duplicate_titles.txt');
            const invalid = read('invalid_metadata.txt');
            const unencoded = read('unencoded_spaces.txt');

            const mode = (process.env.MODE || 'normal').toLowerCase();
            const score = summary.score || 0;
            const thresholds = { lenient: 60, normal: 80, strict: 90, release: 98 };
            const threshold = thresholds[mode] || 80;
            const structural = summary.structural_issues || 0;
            const warning_count = summary.warning_issues || 0;

            let body = [];
            body.push(marker);
            body.push('## 📊 Manifest Integrity Report');
            body.push('**Summary**');
            body.push(`- Integrity score: **${score}/100** (threshold ${threshold})`);
            body.push(`- Mode: **${mode}**`);
            body.push(`- Manifest entries: ${summary.manifest_count || 0}`);
            body.push(`- Docs found: ${summary.actual_docs_count || 0}`);
            body.push(`- Missing targets: ${summary.missing_targets || 0}`);
            body.push(`- Orphaned docs: ${summary.orphaned_docs || 0}`);
            body.push(`- Duplicate path groups: ${summary.duplicate_path_groups || 0}`);
            body.push(`- Case-collisions: ${summary.case_collisions || 0}`);
            body.push(`- Duplicate titles: ${summary.duplicate_titles || 0}`);
            body.push(`- Invalid metadata items: ${summary.invalid_metadata_items || 0}`);
            body.push(`- Unencoded spaces in paths: ${summary.unencoded_spaces || 0}`);
            body.push('');
            body.push('**Highlights**');
            if(missing) body.push('\n**Missing manifest targets (sample):**\n' + '```\n' + missing.split('\n').slice(0,10).join('\n') + '\n```');
            if(orphaned) body.push('\n**Orphaned docs (sample):**\n' + '```\n' + orphaned.split('\n').slice(0,10).join('\n') + '\n```');
            if(dupPaths) body.push('\n**Duplicate paths:**\n' + '```\n' + dupPaths.split('\n').slice(0,10).join('\n') + '\n```');
            if(dupTitles) body.push('\n**Duplicate titles:**\n' + '```\n' + dupTitles.split('\n').slice(0,10).join('\n') + '\n```');
            if(invalid) body.push('\n**Invalid metadata samples:**\n' + '```\n' + invalid.split('\n').slice(0,10).join('\n') + '\n```');
            if(unencoded) body.push('\n**Unencoded paths (sample):**\n' + '```\n' + unencoded.split('\n').slice(0,10).join('\n') + '\n```');
            body.push('---');
            body.push('Full reports attached as workflow artifacts.');

            const comment = body.join('\n');

            const issue_number = context.issue.number;
            const { owner, repo } = context.repo;

            // find existing bot comment with our marker
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number });
            const existing = comments.find(c => c.user && c.body && c.body.includes(marker));
            if(existing){
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: comment });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body: comment });
            }

            // Fail the job if the integrity score is below threshold for the selected mode
            if(score < threshold){
              throw new Error(`Integrity score ${score} is below threshold ${threshold} for mode ${mode}. Failing CI as a quality gate.`);
            }
