name: Link Check (lychee)

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  linkcheck:
    name: Broken Link Scanner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Regenerate manifest
        run: |
          python tools/generate_manifest.py

      - name: Ensure manifest is valid JSON
        run: |
          if [ ! -f docs/manifest.json ]; then echo "docs/manifest.json missing" >&2; exit 1; fi
          python -m json.tool docs/manifest.json

      - name: Prepare site directory
        run: |
          rm -rf site && mkdir site
          rsync -a --exclude='.git' --exclude='.github' --exclude='tools' --exclude='venv' --exclude='node_modules' ./ site/

      - name: Validate manifest entries exist in site
        run: |
          python - <<'PY'
import json, os, sys, urllib.parse
missing = []
data = json.load(open('docs/manifest.json','r',encoding='utf-8'))
for e in data:
    p = e.get('path','')
    if not p:
        missing.append(f"(empty path) - {e}")
        continue
    # decode percent-encoding
    dp = urllib.parse.unquote(p)
    # strip leading slash
    dp = dp.lstrip('/')
    fp = os.path.join('site', dp)
    if not os.path.exists(fp):
        missing.append(p)
if missing:
    print('Missing manifest targets (sample):')
    for m in missing[:50]:
        print(' -', m)
    sys.exit(1)
print('All manifest entries resolved to files in site/')
PY

      - name: Run lychee (broken-link scanner)
        uses: lycheeverse/lychee-action@v1
        with:
          # scan the built site directory; ignore mailto and localhost links; fail on 404s
          args: 'site --save-exit-status --exclude "mailto:" --exclude "http://localhost" --exclude "https://localhost"'
