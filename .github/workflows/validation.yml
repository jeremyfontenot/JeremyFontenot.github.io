name: Repository Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Run repository validation
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate PowerShell syntax
        shell: pwsh
        run: .\scripts\validation\validate-powershell.ps1

      - name: Validate repository structure
        shell: pwsh
        run: .\scripts\validation\validate-repo-structure.ps1

      - name: Validate JSON files
        shell: pwsh
        run: .\scripts\validation\validate-json.ps1

      - name: Validate evidence hashes
        shell: pwsh
        run: .\scripts\validation\validate-evidence-hashes.ps1

      - name: Validate evidence claims
        shell: pwsh
        run: .\scripts\validation\validate-evidence-claims.ps1

      - name: Validate evidence metadata
        shell: pwsh
        run: .\scripts\validation\validate-evidence-metadata.ps1

      - name: Validate accessibility
        shell: pwsh
        run: .\scripts\validation\validate-accessibility.ps1

      - name: Validate public content quality
        shell: pwsh
        run: .\scripts\validation\validate-content.ps1

      - name: Validate HTML files
        shell: pwsh
        run: .\scripts\validation\validate-html.ps1

      - name: Validate screenshots
        shell: pwsh
        run: .\scripts\validation\validate-screenshots.ps1

      - name: Validate Lighthouse scores
        shell: pwsh
        run: .\scripts\lighthouse\validate-lighthouse-scores.ps1

      - name: Validate SEO metadata
        shell: pwsh
        run: .\scripts\validation\validate-seo.ps1

      - name: Validate sitemap
        shell: pwsh
        run: .\scripts\validation\validate-sitemap.ps1

      - name: Validate internal links
        shell: pwsh
        run: .\scripts\validation\validate-links.ps1
