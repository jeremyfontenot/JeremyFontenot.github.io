name: Repository Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Run repository validation
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate repository structure
        shell: pwsh
        run: .\scripts\validation\validate-repo-structure.ps1

      - name: Validate JSON files
        shell: pwsh
        run: .\scripts\validation\validate-json.ps1

      - name: Validate HTML files
        shell: pwsh
        run: .\scripts\validation\validate-html.ps1

      - name: Validate internal links
        shell: pwsh
        run: .\scripts\validation\validate-links.ps1
