name: Repository Remediation Queue

on:
  pull_request:
  workflow_dispatch:

jobs:
  remediation-queue:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate repository policy
        shell: pwsh
        run: ./scripts/validation/Invoke-RepositoryPolicyValidation.ps1

      - name: Generate remediation queue
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $queueScript = './scripts/remediation/Generate-RemediationQueue.ps1'
          if (Test-Path -LiteralPath $queueScript) {
            & $queueScript
            return
          }

          New-Item -ItemType Directory -Force -Path 'internal/remediation', 'internal/reports/phase4' | Out-Null
          @{
            generated_at = (Get-Date).ToUniversalTime().ToString('o')
            status = 'skipped'
            reason = 'Remediation engine scripts are not present in this branch.'
            items = @()
          } | ConvertTo-Json -Depth 4 | Set-Content -LiteralPath 'internal/remediation/remediation-queue.json' -Encoding UTF8

          @(
            '# Remediation Queue'
            ''
            'Status: skipped'
            ''
            'The optional remediation engine scripts are not present in this branch.'
            'Repository governance validation completed before this fallback artifact was generated.'
          ) | Set-Content -LiteralPath 'internal/remediation/remediation-queue.md' -Encoding UTF8

          @(
            '# Remediation Queue Report'
            ''
            '- Queue status: skipped'
            '- Queue items: 0'
            '- Reason: remediation engine scripts are not present in this branch.'
          ) | Set-Content -LiteralPath 'internal/reports/phase4/remediation-queue-report.md' -Encoding UTF8

      - name: Dry-run remediation engine
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $engineScript = './scripts/remediation/Invoke-AutoRemediation.ps1'
          if (Test-Path -LiteralPath $engineScript) {
            & $engineScript -DryRun
            return
          }

          New-Item -ItemType Directory -Force -Path 'internal/reports/phase4' | Out-Null
          @(
            '# Remediation Execution Report'
            ''
            '- Execution status: skipped'
            '- Reason: remediation engine scripts are not present in this branch.'
          ) | Set-Content -LiteralPath 'internal/reports/phase4/execution-report.md' -Encoding UTF8

          @(
            '# Remediation Risk Assessment'
            ''
            '- Protected zone violations: 0'
            '- Destructive attempts: 0'
            '- Execution status: skipped'
          ) | Set-Content -LiteralPath 'internal/reports/phase4/risk-assessment-report.md' -Encoding UTF8

          @(
            '# Duplicate Classification Report'
            ''
            '- Status: skipped'
            '- Items reviewed: 0'
          ) | Set-Content -LiteralPath 'internal/reports/phase4/duplicate-classification-report.md' -Encoding UTF8

          @(
            '# Orphan Suppression Report'
            ''
            '- Status: skipped'
            '- Items reviewed: 0'
          ) | Set-Content -LiteralPath 'internal/reports/phase4/orphan-suppression-report.md' -Encoding UTF8

      - name: Upload remediation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: remediation-queue-artifacts
          path: |
            internal/remediation/remediation-queue.json
            internal/remediation/remediation-queue.md
            internal/reports/phase4/remediation-queue-report.md
            internal/reports/phase4/execution-report.md
            internal/reports/phase4/risk-assessment-report.md
            internal/reports/phase4/duplicate-classification-report.md
            internal/reports/phase4/orphan-suppression-report.md

      - name: Fail on protected or destructive risk
        shell: pwsh
        run: |
          $risk = Get-Content -LiteralPath 'internal/reports/phase4/risk-assessment-report.md' -Raw
          $protected = [regex]::Match($risk, '- Protected zone violations: (\d+)').Groups[1].Value
          $destructive = [regex]::Match($risk, '- Destructive attempts: (\d+)').Groups[1].Value
          if ([int]$protected -gt 0 -or [int]$destructive -gt 0) {
            throw 'Repository remediation dry-run reported protected-zone violations or destructive attempts.'
          }
