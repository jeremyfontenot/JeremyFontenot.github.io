name: SEO Regression Guard

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  seo-regression-guard:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Refresh authoritative active inventory
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          node scripts/audit-site.mjs
          python scripts/generate_sitemap_and_indexnow.py

      - name: Run Pass 4 SEO verification
        shell: pwsh
        run: ./scripts/verify_pass4.ps1

      - name: Validate SEO regression guard
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $report = $null
          $sitemapUrls = @()
          $indexNowPayload = $null

          function Add-Failure {
            param([string]$Message)
            $script:Failures += $Message
            Write-Host "::error::$Message"
          }

          function Get-NormalizedPathKey {
            param([string]$Path)

            if ([string]::IsNullOrWhiteSpace($Path)) {
              return $null
            }

            $normalized = $Path.Trim()
            if ($normalized -match '^https?://') {
              try {
                $uri = [uri]$normalized
                $normalized = $uri.AbsolutePath
              } catch {
                return $null
              }
            }

            if (-not $normalized.StartsWith('/')) {
              $normalized = '/' + $normalized.TrimStart('/')
            }

            $normalized = $normalized -replace '//+', '/'

            if ($normalized -eq '/') {
              return '/'
            }

            if ($normalized -match '/index\.html$') {
              return $normalized.Substring(0, $normalized.Length - 'index.html'.Length)
            }

            return $normalized
          }

          function Get-CanonicalPattern {
            param([string]$Path)

            if ([string]::IsNullOrWhiteSpace($Path)) {
              return $null
            }

            $normalized = $Path.Trim()
            if ($normalized -match '^https?://') {
              try {
                $uri = [uri]$normalized
                $normalized = $uri.AbsolutePath
              } catch {
                return $null
              }
            }

            if (-not $normalized.StartsWith('/')) {
              $normalized = '/' + $normalized.TrimStart('/')
            }

            if ($normalized -eq '/') {
              return 'directory'
            }

            if ($normalized -match '/index\.html$') {
              return 'index-html'
            }

            if ($normalized.EndsWith('/')) {
              return 'directory'
            }

            if ($normalized -match '\.html$') {
              return 'file-html'
            }

            return 'other'
          }

          $script:Failures = @()
          $root = $env:GITHUB_WORKSPACE
          $reportPath = Join-Path $root 'ahrefs_verify_pass4.json'
          $sitemapPath = Join-Path $root 'sitemap.xml'
          $indexNowPath = Join-Path $root 'scripts/indexnow_payload.json'

          if (-not (Test-Path -LiteralPath $reportPath)) {
            Add-Failure 'Verification output is missing: ahrefs_verify_pass4.json'
            $report = $null
          } else {
            try {
              $report = Get-Content -Raw -LiteralPath $reportPath | ConvertFrom-Json
            } catch {
              Add-Failure "Verification output is not valid JSON: $($_.Exception.Message)"
              $report = $null
            }
          }

          $summary = $report.summary
          if ($null -eq $summary) {
            Add-Failure 'Verification summary is missing from ahrefs_verify_pass4.json'
          }

          $brokenLinks = if ($summary) { [int]$summary.total_broken_internal_links } else { 0 }
          $sitemapMissing = if ($summary) { [int]$summary.sitemap_missing_urls } else { 0 }
          $indexNowMissing = if ($summary) { [int]$summary.indexnow_missing_urls } else { 0 }
          $thinContent = if ($summary) { [int]$summary.thin_content_pages } else { 0 }
          $weakMeta = if ($summary) { [int]$summary.weak_meta_descriptions } else { 0 }

          $sitemapUrlCount = 0
          if (-not (Test-Path -LiteralPath $sitemapPath)) {
            Add-Failure 'sitemap.xml is missing.'
          } else {
            try {
              [xml]$sitemapXml = Get-Content -Raw -LiteralPath $sitemapPath
              $sitemapUrls = @($sitemapXml.urlset.url | ForEach-Object { $_.loc })
              $sitemapUrlCount = $sitemapUrls.Count
              if ($sitemapUrlCount -lt 1) {
                Add-Failure 'sitemap.xml contains no URL entries.'
              }
            } catch {
              Add-Failure "sitemap.xml is not valid XML: $($_.Exception.Message)"
            }
          }

          $indexNowUrlCount = 0
          if (-not (Test-Path -LiteralPath $indexNowPath)) {
            Add-Failure 'scripts/indexnow_payload.json is missing.'
          } else {
            try {
              $indexNowPayload = Get-Content -Raw -LiteralPath $indexNowPath | ConvertFrom-Json
              if (-not ($indexNowPayload.PSObject.Properties.Name -contains 'urlList')) {
                Add-Failure 'IndexNow payload does not contain a urlList array.'
              } elseif (@($indexNowPayload.urlList).Count -lt 1) {
                Add-Failure 'IndexNow payload urlList is empty.'
              }
              $indexNowUrlCount = @($indexNowPayload.urlList).Count
            } catch {
              Add-Failure "indexnow_payload.json is not valid JSON: $($_.Exception.Message)"
            }
          }

          $canonicalFailures = 0
          $canonicalSeen = 0
          $canonicalMap = @{}
          $activeHtmlListPath = Join-Path $root 'artifacts/active-html-files.txt'
          if (-not (Test-Path -LiteralPath $activeHtmlListPath)) {
            Add-Failure 'Active HTML inventory is missing: artifacts/active-html-files.txt'
            $htmlFiles = @()
          } else {
            $htmlFiles = Get-Content -LiteralPath $activeHtmlListPath | ForEach-Object { $_.Trim() } | Where-Object { $_ }
          }

          foreach ($file in $htmlFiles) {
            $fullPath = Join-Path $root $file
            if (-not (Test-Path -LiteralPath $fullPath)) {
              Add-Failure "Active HTML file listed but missing: $file"
              continue
            }

            $content = Get-Content -Raw -LiteralPath $fullPath
            $canonicalMatch = [regex]::Match($content, '<link[^>]*rel=["'']canonical["''][^>]*href=["'']([^"'']+)["'']', 'IgnoreCase')
            if (-not $canonicalMatch.Success) {
              continue
            }

            $canonicalSeen++
            $canonicalHref = $canonicalMatch.Groups[1].Value.Trim()
            $pattern = Get-CanonicalPattern -Path $canonicalHref
            $resourceKey = Get-NormalizedPathKey -Path $canonicalHref

            if ($null -eq $pattern -or $null -eq $resourceKey) {
              $canonicalFailures++
              continue
            }

            if (-not $canonicalMap.ContainsKey($resourceKey)) {
              $canonicalMap[$resourceKey] = New-Object 'System.Collections.Generic.HashSet[string]'
            }

            [void]$canonicalMap[$resourceKey].Add($pattern)
          }

          if ($canonicalSeen -gt 0) {
            foreach ($entry in $canonicalMap.GetEnumerator()) {
              if ($entry.Value.Count -gt 1) {
                $canonicalFailures++
                Add-Failure "Canonical inconsistency detected for $($entry.Key): $(@($entry.Value) -join ', ')"
              }
            }

            $sitemapKeys = New-Object 'System.Collections.Generic.HashSet[string]'
            foreach ($url in @($sitemapUrls)) {
              $normalizedKey = Get-NormalizedPathKey -Path $url
              if ($null -ne $normalizedKey) {
                [void]$sitemapKeys.Add($normalizedKey)
              }
            }

            foreach ($resourceKey in $canonicalMap.Keys) {
              if (-not $sitemapKeys.Contains($resourceKey)) {
                $canonicalFailures++
                Add-Failure "Canonical URL is not represented in sitemap: $resourceKey"
              }
            }

            if ($report -and $report.report -and $report.report.missing_canonicals) {
              $missingCanonicals = @($report.report.missing_canonicals).Count
              if ($missingCanonicals -gt 0) {
                $canonicalFailures += $missingCanonicals
                Add-Failure "Verifier reported $missingCanonicals missing canonical tag(s)."
              }
            }
          } else {
            Write-Host 'Canonical inconsistencies: skipped (no canonical tags found)'
          }

          Write-Host "Broken links: $brokenLinks"
          Write-Host "Sitemap missing: $sitemapMissing"
          Write-Host "IndexNow missing: $indexNowMissing"
          Write-Host "Thin content: $thinContent"
          Write-Host "Metadata issues: $weakMeta"
          if ($canonicalSeen -gt 0) {
            Write-Host "Canonical inconsistencies: $canonicalFailures"
          }

          if ($brokenLinks -gt 0) {
            Add-Failure "Broken internal links detected: $brokenLinks"
          }

          if ($sitemapMissing -gt 0) {
            Add-Failure "Sitemap missing URLs detected: $sitemapMissing"
          }

          if ($indexNowMissing -gt 0) {
            Add-Failure "IndexNow missing URLs detected: $indexNowMissing"
          }

          if ($thinContent -gt 0) {
            Add-Failure "Thin content pages detected: $thinContent"
          }

          if ($weakMeta -gt 0) {
            Add-Failure "Weak meta descriptions detected: $weakMeta"
          }

          if ($canonicalFailures -gt 0) {
            Add-Failure "Canonical inconsistencies detected: $canonicalFailures"
          }

          if ($sitemapUrlCount -lt 1) {
            Add-Failure 'Sitemap validation failed: at least one URL entry is required.'
          }

          if ($indexNowUrlCount -lt 1) {
            Add-Failure 'IndexNow validation failed: urlList must contain at least one URL.'
          }

          if ($script:Failures.Count -gt 0) {
            Write-Host 'Status: FAIL'
            throw "SEO regression guard failed with $($script:Failures.Count) issue(s)."
          }

          Write-Host 'Status: PASS'