name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-validate:
    name: Build, regenerate manifest, validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install optional Python deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Regenerate manifest
        run: |
          python tools/generate_manifest.py

      - name: Ensure manifest is valid JSON
        run: |
          if [ ! -f docs/manifest.json ]; then echo "docs/manifest.json missing" >&2; exit 1; fi
          python -m json.tool docs/manifest.json

      - name: Validate manifest contents
        run: |
          python tools/validate_manifest.py

      - name: Ensure docs have content
        run: |
          COUNT=$(find docs -type f -name '*.html' | wc -l)
          echo "Docs HTML count: $COUNT"
          if [ "$COUNT" -lt 1 ]; then echo "No docs HTML files found in docs/" >&2; exit 1; fi

      - name: Prepare site directory for Pages
        run: |
          rm -rf site && mkdir site
          shopt -s dotglob || true
          # Copy repository contents into site, excluding repo internals and tooling
          rsync -a --exclude='.git' --exclude='.github' --exclude='tools' --exclude='venv' --exclude='node_modules' ./ site/

      - name: Configure Pages (setup deployment target)
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy artifact to GitHub Pages
    needs: build-and-validate
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Pages
        uses: actions/deploy-pages@v4

  # Optional future jobs (suggested additions): Lighthouse, broken-link scanner, HTML validation
  # These are left as separate workflows or jobs to add after Pages deploy is confirmed.
