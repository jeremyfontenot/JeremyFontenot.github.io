name: Validate Evidence Links

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  validate-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Find evidence links and verify files exist
        run: |
          set -e
          # find all hrefs to evidence/ in docs and index files
          grep -rhoE "href=\"[^\"]*evidence/[^\"]*\"" | sed -E 's/href=\"//;s/\"$//' | sort -u > evidence-links.txt || true
          echo "Found links:"; cat evidence-links.txt
          missing=0
          while read -r link; do
            # normalize path
            path=$(echo "$link" | sed 's#^\./##; s#^/##')
            if [ ! -f "$path" ]; then
              echo "MISSING: $path"
              missing=1
            else
              echo "OK: $path"
            fi
          done < evidence-links.txt
          if [ "$missing" -eq 1 ]; then
            echo "One or more evidence files are missing. Failing check.";
            exit 1
          fi
