name: Repository Governance Validation

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate reports and run validation
        shell: pwsh
        run: ./scripts/validation/Invoke-RepositoryPolicyValidation.ps1

      - name: Upload validation reports
        uses: actions/upload-artifact@v4
        with:
          name: governance-validation-reports
          path: |
            internal/reports/phase2/
            internal/reports/phase3/
