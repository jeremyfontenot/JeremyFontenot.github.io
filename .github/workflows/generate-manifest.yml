name: Generate Documentation Manifest

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Generate manifest
        run: |
          python tools/generate_manifest.py

      - name: Validate manifest exists
        run: |
          test -f docs/manifest.json

      - name: Validate URL encoding
        run: |
          python - <<'PY'
import json,sys
data = json.load(open('docs/manifest.json'))
bad = [x['path'] for x in data if ' ' in x.get('path','')]
if bad:
    print('Found manifest entries with unencoded spaces:')
    print('\n'.join(bad[:20]))
    sys.exit(1)
print('Manifest URL encoding OK')
PY

      - name: Commit updated manifest (if changed)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/manifest.json
          git diff --staged --quiet || (git commit -m "Auto-update docs/manifest.json" && git push)
