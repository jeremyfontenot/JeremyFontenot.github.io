<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">PowerShell provisioning workflow</title>
  <desc id="desc">A workflow diagram showing CSV intake, Active Directory user creation, group assignment, and logging.</desc>
  <rect width="960" height="540" fill="#071226"/>
  <rect x="36" y="36" width="888" height="468" rx="24" fill="#0d1b34" stroke="#3fe0e8" stroke-opacity=".35"/>
  <text x="64" y="86" fill="#6af7ff" font-family="Segoe UI, Arial" font-size="24" font-weight="700">PowerShell User Provisioning</text>
  <g font-family="Segoe UI, Arial" text-anchor="middle" font-size="16" font-weight="700">
    <g fill="#132543" stroke="#3fe0e8"><rect x="80" y="210" width="150" height="76" rx="14"/><rect x="290" y="210" width="150" height="76" rx="14"/><rect x="500" y="210" width="150" height="76" rx="14"/><rect x="710" y="210" width="150" height="76" rx="14"/></g>
    <g fill="#f5f7fa"><text x="155" y="254">CSV Intake</text><text x="365" y="254">New-ADUser</text><text x="575" y="246">Group</text><text x="575" y="268">Assignment</text><text x="785" y="254">Run Log</text></g>
    <g stroke="#d65be8" stroke-width="3" fill="none"><path d="M230 248h60"/><path d="M440 248h60"/><path d="M650 248h60"/></g>
  </g>
  <rect x="96" y="356" width="768" height="70" rx="14" fill="#071226" stroke="#d65be8" stroke-opacity=".45"/>
  <text x="128" y="397" fill="#b8c2d1" font-family="Cascadia Mono, Consolas, monospace" font-size="14">Validate input -> create account -> assign role group -> write auditable output</text>
</svg>
