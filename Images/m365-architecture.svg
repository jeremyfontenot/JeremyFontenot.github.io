  <line x1="82"  y1="147" x2="172" y2="147" stroke="#1AE0D7" stroke-width="0.7" opacity="0.5"/>
  <text x="127" y="161" text-anchor="middle" font-family="Inter,Arial,sans-serif" font-size="9.5" fill="#9BA3AE">Users · Groups · Roles</text>
