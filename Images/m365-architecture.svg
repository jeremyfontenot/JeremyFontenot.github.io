<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" role="img"
     aria-labelledby="diag-title diag-desc">

  <title id="diag-title">Microsoft 365 Personal Cloud Lab Architecture</title>
  <desc id="diag-desc">Architecture diagram showing eight Microsoft 365 services — Entra ID, Intune, Exchange Online, SharePoint Online, OneDrive for Business, Microsoft Teams, Power Platform, and Defender &amp; Compliance — all within a single Microsoft 365 tenant.</desc>

  <!-- ── Background ── -->
  <rect width="900" height="450" rx="14" fill="#02060A"/>
  <rect x="1" y="1" width="898" height="448" rx="13" fill="none" stroke="#1AE0D7" stroke-width="0.5" opacity="0.25"/>

  <!-- ── Diagram title ── -->
  <text x="450" y="34" text-anchor="middle"
        font-family="Montserrat,Arial,sans-serif" font-size="15" font-weight="700"
        fill="#1AE0D7" letter-spacing="2">MICROSOFT 365 PERSONAL CLOUD LAB</text>

  <!-- ── Tenant boundary ── -->
  <rect x="14" y="47" width="872" height="393" rx="10"
        fill="rgba(10,42,67,0.22)" stroke="#1AE0D7" stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="28" y="66"
        font-family="Inter,Arial,sans-serif" font-size="10" font-weight="700"
        fill="#1AE0D7" letter-spacing="2.5">MICROSOFT 365 TENANT</text>

