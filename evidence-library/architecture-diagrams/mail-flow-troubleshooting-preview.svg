<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Mail Flow Troubleshooting RCA Preview</title>
  <desc id="desc">Flow diagram for incident intake, analysis, validation, resolution, and evidence-based RCA follow-up.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111c31"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#38bdf8"/>
    </marker>
    <style>
      .title{font:700 30px 'Segoe UI',Arial,sans-serif; fill:#f8fafc}
      .subtitle{font:400 14px 'Segoe UI',Arial,sans-serif; fill:#cbd5e1}
      .boxTitle{font:700 18px 'Segoe UI',Arial,sans-serif; fill:#f8fafc}
      .boxText{font:400 13px 'Segoe UI',Arial,sans-serif; fill:#dbeafe}
      .stroke{stroke:#38bdf8; stroke-width:2.5}
    </style>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <rect x="36" y="36" width="1128" height="688" rx="24" fill="rgba(15,23,42,0.5)" stroke="rgba(56,189,248,0.25)"/>
  <text x="60" y="78" class="title">Mail Flow Troubleshooting RCA</text>
  <text x="60" y="102" class="subtitle">A clean incident flow from initial impact through validation, documentation, and recurrence review.</text>

  <g>
    <rect x="474" y="118" width="252" height="82" rx="14" fill="#111827" stroke="#38bdf8" class="stroke"/>
    <text x="600" y="153" text-anchor="middle" class="boxTitle">Capture Impact</text>
    <text x="600" y="176" text-anchor="middle" class="boxText">Scope, symptoms, timing, affected users</text>
  </g>

  <g>
    <rect x="474" y="242" width="252" height="82" rx="14" fill="#172554" stroke="#a78bfa" class="stroke"/>
    <text x="600" y="277" text-anchor="middle" class="boxTitle">Analyze Paths</text>
    <text x="600" y="300" text-anchor="middle" class="boxText">Endpoint, network, service, and transport checks</text>
  </g>

  <g>
    <rect x="130" y="394" width="220" height="88" rx="14" fill="#123524" stroke="#22c55e" class="stroke"/>
    <text x="240" y="428" text-anchor="middle" class="boxTitle">Validate DNS / DHCP</text>
    <text x="240" y="451" text-anchor="middle" class="boxText">Name resolution, leases, reachability</text>
  </g>

  <g>
    <rect x="490" y="394" width="220" height="88" rx="14" fill="#1e293b" stroke="#38bdf8" class="stroke"/>
    <text x="600" y="428" text-anchor="middle" class="boxTitle">Validate Mail Transport</text>
    <text x="600" y="451" text-anchor="middle" class="boxText">Rules, traces, queue health, delivery path</text>
  </g>

  <g>
    <rect x="850" y="394" width="220" height="88" rx="14" fill="#3b1f2b" stroke="#f472b6" class="stroke"/>
    <text x="960" y="428" text-anchor="middle" class="boxTitle">Validate Service Health</text>
    <text x="960" y="451" text-anchor="middle" class="boxText">Dependencies, logs, and user recovery</text>
  </g>

  <g>
    <rect x="474" y="562" width="252" height="88" rx="14" fill="#0f172a" stroke="#38bdf8" class="stroke"/>
    <text x="600" y="596" text-anchor="middle" class="boxTitle">Document Resolution</text>
    <text x="600" y="619" text-anchor="middle" class="boxText">Commands, evidence, fix, and validation result</text>
  </g>

  <g fill="none" class="stroke" marker-end="url(#arrow)">
    <path d="M600 200V242"/>
    <path d="M600 324C600 354 420 364 240 394"/>
    <path d="M600 324V394"/>
    <path d="M600 324C600 354 780 364 960 394"/>
    <path d="M240 482C300 530 430 550 474 586"/>
    <path d="M600 482V562"/>
    <path d="M960 482C900 530 770 550 726 586"/>
  </g>

  <g stroke="#1d4ed8" stroke-width="1" opacity="0.18">
    <path d="M72 118H1128"/>
    <path d="M72 364H1128"/>
  </g>
</svg>
