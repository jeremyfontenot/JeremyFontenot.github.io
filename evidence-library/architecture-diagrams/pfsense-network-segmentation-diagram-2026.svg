<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">pfSense Home Lab Network Segmentation Diagram 2026</title>
  <desc id="desc">Conceptual WAN, pfSense, VLAN, VPN, management, workstation, server, and lab segmentation model for a home lab.</desc>
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .panel { fill: #111827; stroke: #38bdf8; stroke-width: 2; rx: 14; }
      .zone { fill: #1f2937; stroke: #94a3b8; stroke-width: 1.5; rx: 12; }
      .security { fill: #172554; stroke: #60a5fa; }
      .lab { fill: #312e81; stroke: #a78bfa; }
      .warn { fill: #3b1f2b; stroke: #f472b6; }
      .text { fill: #e5e7eb; font-family: Arial, sans-serif; font-size: 18px; }
      .small { fill: #cbd5e1; font-family: Arial, sans-serif; font-size: 14px; }
      .tiny { fill: #94a3b8; font-family: Arial, sans-serif; font-size: 12px; }
      .title { fill: #ffffff; font-family: Arial, sans-serif; font-size: 26px; font-weight: 700; }
      .line { stroke: #38bdf8; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .deny { stroke: #f472b6; stroke-width: 2.5; stroke-dasharray: 8 6; fill: none; marker-end: url(#arrowPink); }
      .allow { stroke: #22c55e; stroke-width: 2.5; fill: none; marker-end: url(#arrowGreen); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#38bdf8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrowPink" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f472b6"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text x="50" y="52" class="title">pfSense Home Lab Network Segmentation</text>
  <text x="50" y="80" class="small">Conceptual segmentation model for WAN, LAN, VLANs, VPN access, and lab service zones.</text>

  <rect x="50" y="130" width="160" height="100" class="zone"/>
  <text x="88" y="170" class="text">WAN</text>
  <text x="72" y="198" class="small">Internet edge</text>

  <rect x="310" y="110" width="220" height="140" class="panel"/>
  <text x="380" y="155" class="text">pfSense</text>
  <text x="345" y="185" class="small">Routing and firewall</text>
  <text x="343" y="210" class="small">Default-deny policy review</text>

  <rect x="650" y="110" width="220" height="140" class="zone"/>
  <text x="700" y="155" class="text">D-Link Switch</text>
  <text x="684" y="185" class="small">VLAN trunks/access ports</text>
  <text x="697" y="210" class="small">Lab uplink fabric</text>

  <rect x="940" y="110" width="200" height="140" class="zone"/>
  <text x="988" y="155" class="text">Dell R710</text>
  <text x="965" y="185" class="small">Proxmox workloads</text>
  <text x="969" y="210" class="small">Multiple NIC uplinks</text>

  <path d="M210 180 H310" class="line"/>
  <path d="M530 180 H650" class="line"/>
  <path d="M870 180 H940" class="line"/>

  <rect x="75" y="335" width="210" height="125" class="security"/>
  <text x="116" y="375" class="text">Management</text>
  <text x="102" y="405" class="small">pfSense, Proxmox, switch</text>
  <text x="96" y="430" class="small">Admin-only access</text>

  <rect x="350" y="335" width="210" height="125" class="zone"/>
  <text x="406" y="375" class="text">Workstation</text>
  <text x="382" y="405" class="small">Windows admin endpoint</text>
  <text x="384" y="430" class="small">DNS, DHCP, internet</text>

  <rect x="625" y="335" width="210" height="125" class="security"/>
  <text x="696" y="375" class="text">Server</text>
  <text x="663" y="405" class="small">AD, DNS, DHCP services</text>
  <text x="670" y="430" class="small">Controlled service access</text>

  <rect x="900" y="335" width="210" height="125" class="lab"/>
  <text x="972" y="375" class="text">Lab/Test</text>
  <text x="937" y="405" class="small">Temporary VMs and tests</text>
  <text x="947" y="430" class="small">Restricted lateral access</text>

  <rect x="350" y="570" width="210" height="110" class="warn"/>
  <text x="422" y="608" class="text">VPN</text>
  <text x="382" y="637" class="small">WireGuard/OpenVPN</text>
  <text x="378" y="662" class="small">Approved internal routes</text>

  <path d="M420 250 V300 H180 V335" class="allow"/>
  <path d="M420 250 V300 H455 V335" class="allow"/>
  <path d="M420 250 V300 H730 V335" class="allow"/>
  <path d="M420 250 V300 H1005 V335" class="allow"/>
  <path d="M455 570 V460" class="allow"/>
  <path d="M1005 460 C1005 520 760 520 730 460" class="deny"/>
  <path d="M455 460 C455 520 200 520 180 460" class="deny"/>

  <rect x="75" y="705" width="1040" height="36" fill="#111827" stroke="#334155"/>
  <text x="92" y="728" class="tiny">Policy intent: allow required services, deny lateral movement by default, preserve logs during troubleshooting, and validate DNS/DHCP/VPN paths before migration.</text>
</svg>
