<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" aria-labelledby="title desc" viewBox="0 0 1200 760"><title id="title">pfSense Home Lab Network Segmentation Diagram 2026</title><desc id="desc">Conceptual WAN, pfSense, VLAN, VPN, management, workstation, server, and lab segmentation model for a home lab.</desc><defs><marker id="arrow" markerHeight="10" markerWidth="10" orient="auto" refX="7" refY="3"><path fill="#38bdf8" d="M0 0v6l8-3z"/></marker><marker id="arrowGreen" markerHeight="10" markerWidth="10" orient="auto" refX="7" refY="3"><path fill="#22c55e" d="M0 0v6l8-3z"/></marker><marker id="arrowPink" markerHeight="10" markerWidth="10" orient="auto" refX="7" refY="3"><path fill="#f472b6" d="M0 0v6l8-3z"/></marker><style>.zone{fill:#1f2937;stroke:#94a3b8;stroke-width:1.5;rx:12}.security{fill:#172554;stroke:#60a5fa}.small,.text{font-family:Arial,sans-serif}.text{fill:#e5e7eb;font-size:18px}.small{fill:#cbd5e1;font-size:14px}.line{stroke:#38bdf8;stroke-width:3;fill:none;marker-end:url(#arrow)}.allow,.deny{stroke-width:2.5;fill:none}.deny{stroke:#f472b6;stroke-dasharray:8 6;marker-end:url(#arrowPink)}.allow{stroke:#22c55e;marker-end:url(#arrowGreen)}</style></defs><path d="M0 0h1200v760H0z" style="fill:#0f172a"/><text x="50" y="52" style="fill:#fff;font-family:Arial,sans-serif;font-size:26px;font-weight:700">pfSense Home Lab Network Segmentation</text><text x="50" y="80" class="small">Conceptual segmentation model for WAN, LAN, VLANs, VPN access, and lab service zones.</text><path d="M50 130h160v100H50z" class="zone"/><text x="88" y="170" class="text">WAN</text><text x="72" y="198" class="small">Internet edge</text><path d="M310 110h220v140H310z" style="fill:#111827;stroke:#38bdf8;stroke-width:2;rx:14"/><text x="380" y="155" class="text">pfSense</text><text x="345" y="185" class="small">Routing and firewall</text><text x="343" y="210" class="small">Default-deny policy review</text><path d="M650 110h220v140H650z" class="zone"/><text x="700" y="155" class="text">D-Link Switch</text><text x="684" y="185" class="small">VLAN trunks/access ports</text><text x="697" y="210" class="small">Lab uplink fabric</text><path d="M940 110h200v140H940z" class="zone"/><text x="988" y="155" class="text">Dell R710</text><text x="965" y="185" class="small">Proxmox workloads</text><text x="969" y="210" class="small">Multiple NIC uplinks</text><path d="M210 180h100" class="line"/><path d="M530 180h120" class="line"/><path d="M870 180h70" class="line"/><path d="M75 335h210v125H75z" class="security"/><text x="116" y="375" class="text">Management</text><text x="102" y="405" class="small">pfSense, Proxmox, switch</text><text x="96" y="430" class="small">Admin-only access</text><path d="M350 335h210v125H350z" class="zone"/><text x="406" y="375" class="text">Workstation</text><text x="382" y="405" class="small">Windows admin endpoint</text><text x="384" y="430" class="small">DNS, DHCP, internet</text><path d="M625 335h210v125H625z" class="security"/><text x="696" y="375" class="text">Server</text><text x="663" y="405" class="small">AD, DNS, DHCP services</text><text x="670" y="430" class="small">Controlled service access</text><path d="M900 335h210v125H900z" style="fill:#312e81;stroke:#a78bfa"/><text x="972" y="375" class="text">Lab/Test</text><text x="937" y="405" class="small">Temporary VMs and tests</text><text x="947" y="430" class="small">Restricted lateral access</text><path d="M350 570h210v110H350z" style="fill:#3b1f2b;stroke:#f472b6"/><text x="422" y="608" class="text">VPN</text><text x="382" y="637" class="small">WireGuard/OpenVPN</text><text x="378" y="662" class="small">Approved internal routes</text><path d="M420 250v50H180v35" class="allow"/><path d="M420 250v50h35v35" class="allow"/><path d="M420 250v50h310v35" class="allow"/><path d="M420 250v50h585v35" class="allow"/><path d="M455 570V460" class="allow"/><path d="M1005 460c0 60-245 60-275 0" class="deny"/><path d="M455 460c0 60-255 60-275 0" class="deny"/><path fill="#111827" stroke="#334155" d="M75 705h1040v36H75z"/><text x="92" y="728" style="fill:#94a3b8;font-family:Arial,sans-serif;font-size:12px">Policy intent: allow required services, deny lateral movement by default, preserve logs during troubleshooting, and validate DNS/DHCP/VPN paths before migration.</text></svg>