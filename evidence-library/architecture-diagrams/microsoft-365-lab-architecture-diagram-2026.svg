<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Microsoft 365 lab architecture</title>
  <desc id="desc">Architecture view showing Entra ID connected to Microsoft 365 services and Intune endpoint management.</desc>
  <rect width="960" height="540" fill="#071226"/>
  <rect x="34" y="34" width="892" height="472" rx="24" fill="#0d1b34" stroke="#3fe0e8" stroke-opacity=".35"/>
  <text x="62" y="84" fill="#6af7ff" font-family="Segoe UI, Arial" font-size="24" font-weight="700">Microsoft 365 Personal Cloud Lab</text>
  <g font-family="Segoe UI, Arial" text-anchor="middle">
    <rect x="370" y="130" width="220" height="70" rx="16" fill="#132543" stroke="#3fe0e8"/>
    <text x="480" y="172" fill="#f5f7fa" font-size="18" font-weight="700">Entra ID</text>
    <path d="M480 200v60M250 260h460M250 260v52M403 260v52M557 260v52M710 260v52" stroke="#3fe0e8" stroke-width="2"/>
    <g fill="#132543" stroke="#d65be8">
      <rect x="160" y="312" width="180" height="72" rx="14"/><rect x="313" y="312" width="180" height="72" rx="14"/><rect x="467" y="312" width="180" height="72" rx="14"/><rect x="620" y="312" width="180" height="72" rx="14"/>
    </g>
    <g fill="#f5f7fa" font-size="15" font-weight="700">
      <text x="250" y="354">Exchange Online</text><text x="403" y="354">SharePoint</text><text x="557" y="354">Teams</text><text x="710" y="354">Intune</text>
