<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Service Desk Network Troubleshooting Flow 2026</title>
  <desc id="desc">Layered service desk troubleshooting workflow for endpoint, DNS, DHCP, VPN, and firewall network issues.</desc>
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .node { fill: #111827; stroke: #38bdf8; stroke-width: 2; rx: 12; }
      .decision { fill: #172554; stroke: #a78bfa; stroke-width: 2; rx: 12; }
      .escalate { fill: #3b1f2b; stroke: #f472b6; stroke-width: 2; rx: 12; }
      .done { fill: #123524; stroke: #22c55e; stroke-width: 2; rx: 12; }
      .text { fill: #e5e7eb; font-family: Arial, sans-serif; font-size: 17px; font-weight: 700; }
      .small { fill: #cbd5e1; font-family: Arial, sans-serif; font-size: 13px; }
      .title { fill: #ffffff; font-family: Arial, sans-serif; font-size: 26px; font-weight: 700; }
      .line { stroke: #38bdf8; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#38bdf8"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="900"/>
  <text x="60" y="52" class="title">Service Desk Network Troubleshooting Flow</text>
  <text x="60" y="80" class="small">Use for real ticket triage, lab validation, and escalation documentation. Results must be captured from actual systems.</text>

  <rect x="460" y="120" width="280" height="70" class="node"/>
  <text x="507" y="150" class="text">Capture User Impact</text>
  <text x="492" y="172" class="small">Affected system, time, scope, symptoms</text>

  <rect x="460" y="230" width="280" height="70" class="decision"/>
  <text x="504" y="260" class="text">Single Device or Wider?</text>
  <text x="496" y="282" class="small">Compare endpoint, VLAN, and service scope</text>

  <rect x="110" y="350" width="250" height="78" class="node"/>
  <text x="160" y="380" class="text">Endpoint Path</text>
  <text x="138" y="404" class="small">Adapter, IP config, local firewall</text>

  <rect x="475" y="350" width="250" height="78" class="node"/>
  <text x="537" y="380" class="text">Network Path</text>
  <text x="500" y="404" class="small">Gateway, VLAN, DNS, DHCP</text>

  <rect x="840" y="350" width="250" height="78" class="node"/>
  <text x="909" y="380" class="text">Service Path</text>
  <text x="868" y="404" class="small">AD, VPN, firewall, application</text>

  <rect x="110" y="510" width="250" height="78" class="decision"/>
  <text x="157" y="540" class="text">DNS/DHCP Issue?</text>
  <text x="135" y="564" class="small">Check resolver, scope, lease, options</text>

  <rect x="475" y="510" width="250" height="78" class="decision"/>
  <text x="536" y="540" class="text">VPN/Firewall?</text>
  <text x="505" y="564" class="small">Check routes, rules, logs, allowed zones</text>

  <rect x="840" y="510" width="250" height="78" class="decision"/>
  <text x="894" y="540" class="text">Service Healthy?</text>
  <text x="866" y="564" class="small">Check status, logs, dependencies</text>

  <rect x="110" y="670" width="250" height="78" class="done"/>
  <text x="149" y="700" class="text">Document Resolution</text>
  <text x="135" y="724" class="small">Commands, evidence, fix, validation</text>

  <rect x="475" y="670" width="250" height="78" class="escalate"/>
  <text x="538" y="700" class="text">Escalate With Evidence</text>
  <text x="500" y="724" class="small">Scope, logs, suspected boundary, risk</text>

  <rect x="840" y="670" width="250" height="78" class="done"/>
  <text x="903" y="700" class="text">RCA Trigger?</text>
  <text x="866" y="724" class="small">Recurring, change-caused, multi-user</text>

  <path d="M600 190 V230" class="line"/>
  <path d="M560 300 C430 325 300 320 235 350" class="line"/>
  <path d="M600 300 V350" class="line"/>
  <path d="M640 300 C770 325 900 320 965 350" class="line"/>
  <path d="M235 428 V510" class="line"/>
  <path d="M600 428 V510" class="line"/>
  <path d="M965 428 V510" class="line"/>
  <path d="M235 588 V670" class="line"/>
  <path d="M600 588 V670" class="line"/>
  <path d="M965 588 V670" class="line"/>
</svg>
